sonar.projectKey=mwognicki_pull-secrets-operator
sonar.organization=mwognicki

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=pull-secrets-operator
#sonar.projectVersion=1.0
sonar.sources=api,cmd,internal,pkg
sonar.inclusions=api/**/*.go,cmd/**/*.go,internal/**/*.go,pkg/**/*.go
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.exclusions=**/doc.go
sonar.go.coverage.reportPaths=coverage.out
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8
