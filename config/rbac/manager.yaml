apiVersion: v1
kind: ServiceAccount
metadata:
  name: pull-secrets-operator-manager
  namespace: pull-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pull-secrets-operator-manager
rules:
  - apiGroups:
      - pullsecrets.ognicki.ooo
    resources:
      - registrypullsecrets
      - pullsecretpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - pullsecrets.ognicki.ooo
    resources:
      - registrypullsecrets/status
      - pullsecretpolicies/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pull-secrets-operator-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pull-secrets-operator-manager
subjects:
  - kind: ServiceAccount
    name: pull-secrets-operator-manager
    namespace: pull-secrets
