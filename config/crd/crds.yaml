metadata:
  name: pull-secrets-operator-manager
  namespace: pull-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pull-secrets-operator-manager
rules:
  - apiGroups:
      - pullsecrets.ognicki.ooo
    resources:
      - registrypullsecrets
      - pullsecretpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - pullsecrets.ognicki.ooo
    resources:
      - registrypullsecrets/status
      - pullsecretpolicies/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pull-secrets-operator-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pull-secrets-operator-manager
subjects:
  - kind: ServiceAccount
    name: pull-secrets-operator-manager
    namespace: pull-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pull-secrets-operator-manager
  namespace: pull-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pull-secrets-operator
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pull-secrets-operator
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: pull-secrets-operator-manager
      containers:
        - name: manager
          image: ghcr.io/mwognicki/pull-secrets-operator:dev-alpha1
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
---
