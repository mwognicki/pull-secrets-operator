name: Release Helm Chart

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CHART_DIR: helm/pull-secrets-operator
  CHARTS_REGISTRY: ghcr.io/mwognicki/charts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  helm-release:
    name: Package and Push Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Derive chart version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Helm chart versions must be semver without the leading 'v'
          CHART_VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into Chart.yaml and values.yaml
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.chart_version }}/" \
            "${{ env.CHART_DIR }}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: ${{ steps.version.outputs.tag }}/" \
            "${{ env.CHART_DIR }}/Chart.yaml"
          # Keep the image tag in values.yaml in sync with the release
          sed -i "s/^  tag:.*/  tag: ${{ steps.version.outputs.tag }}/" \
            "${{ env.CHART_DIR }}/values.yaml"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        id: package
        run: |
          helm package "${{ env.CHART_DIR }}" --destination /tmp/helm-pkg
          PACKAGE="$(ls /tmp/helm-pkg/*.tgz)"
          echo "package=${PACKAGE}" >> "$GITHUB_OUTPUT"

      - name: Push Helm chart to GHCR (OCI)
        run: |
          helm push "${{ steps.package.outputs.package }}" \
            "oci://${{ env.CHARTS_REGISTRY }}"

      - name: Push ArtifactHub repository metadata
        run: |
          oras push \
            "${{ env.CHARTS_REGISTRY }}/pull-secrets-operator:artifacthub.io" \
            --config /dev/null:application/vnd.oci.image.config.v1+json \
            "artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml"
